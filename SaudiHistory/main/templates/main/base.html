{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl" {% if 'mode' in request.COOKIES %} class="light_mode" {% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    
    <!--bootstrap css link-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!--font and icon links-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close" />
    
    <!--css link-->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
   <header>
    <nav class="navbar">
        <div class="logo">
            <img src="{% static 'images/logo.png' %}" alt="Saudi History Logo" class="nav-logo">
        </div>

        <div class="nav-links">
            <ul>
                <li><a href="{% url 'main:home_view' %}">الرئسيه</a></li>
                <li><a href="{% url 'main:home_view' %}#overview">نظرة عامة</a></li>
                <li><a href="{% url 'main:home_view' %}#foundation">التأسيس</a></li>
                <li><a href="{% url 'main:home_view' %}#rulers">حكام المملكة</a></li>

            <div class="mode">
                 <a href="{% url 'main:dark_mode_view' %}">moon</a>
                <a href="{% url 'main:light_mode_view' %}">sun</a>
               
                
            </div>

            </ul>
        </div>
        
    </nav>
</header>


    <main>

        {% block content %}
        {% endblock %}

    </main>
       <!--bootstrap js link-->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     <script src="\static\js\script.js"></script>
 
</body>
</html>
